version: "3.9"

x-siren-env: &siren-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql+asyncpg://siren:siren@postgres:5432/siren
  QDRANT_URL: http://qdrant:6333
  SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
  SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
  SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-siren}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENVIRONMENT: ${ENVIRONMENT:-development}

services:
  siren-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *siren-env
    volumes:
      - ../siren:/app/siren   # hot reload in dev
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    command: uvicorn siren.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    environment:
      <<: *siren-env
      SIREN_API_URL: http://siren-api:8000
    depends_on:
      - siren-api
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siren
      POSTGRES_PASSWORD: siren
      POSTGRES_DB: siren
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siren"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana

  # Memory-constrained Redis for demo scenario
  redis-demo:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy noeviction
    profiles:
      - demo

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
