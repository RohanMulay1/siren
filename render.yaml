services:
  - type: web
    name: siren-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn siren.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LANGSMITH_PROJECT
        value: siren
      - key: LLM_PROVIDER
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: DATABASE_URL
        fromDatabase:
          name: siren-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: siren-redis
          property: connectionString

  - type: redis
    name: siren-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: siren-db
    plan: free
    databaseName: siren
    user: siren
